version: 2

models:
  - name: gold_frequencia_por_linha
    description: "Tabela agregada que calcula o intervalo (headway) médio por linha e período."
    columns:
      - name: route_id
        description: "ID único da rota (FK da silver_routes)."
        tests:
          - not_null # Garante que não há rotas sem ID

      - name: periodo_dia
        description: "Segmentação do horário de início da viagem."
        tests:
          - accepted_values:
              arguments:
                values: ['madrugada', 'pico_manha', 'manha', 'tarde', 'pico_tarde', 'noite', 'noite_tardia']

      - name: headway_medio_min
        description: "Média do intervalo entre partidas em minutos."
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0" # Garante que o cálculo de tempo não gerou valores negativos